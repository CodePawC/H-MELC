name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meptest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d meptest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/meptest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Migrate
        working-directory: backend
        run: alembic upgrade head
      - name: Test
        working-directory: backend
        run: pytest -q

  frontend-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-admin/package-lock.json
      - name: Install frontend
        working-directory: frontend-admin
        run: npm ci
      - name: Build frontend
        working-directory: frontend-admin
        run: npm run build
