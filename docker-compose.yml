name: h-melc

# 与您已有 Compose 并行时可能发生端口占用，可删减服务或改用 profiles。
# Postgres 宿主口默认 5433：避免与本机或其它 compose（占用 5432）冲突。
# Redis 宿主口默认 16379：避免与本机 6379 冲突。
# MinIO API 宿主口默认 9002（控制台 9003）：避免与本机 9000 冲突。
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mep_user
      POSTGRES_PASSWORD: mep_password
      POSTGRES_DB: mep
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: postgresql+psycopg://mep_user:mep_password@postgres:5432/mep
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: mep-files
      MINIO_SECURE: "false"
      # 开发体验：启动时 alembic upgrade head，并预置 admin（生产镜像请关闭并自行建号）
      MEP_BOOTSTRAP_DEV_ADMIN: "1"
      MEP_DEV_ADMIN_USERNAME: admin
      MEP_DEV_ADMIN_PASSWORD: admin123
    ports:
      - "8102:8000"

volumes:
  postgres_data:
  minio_data:
